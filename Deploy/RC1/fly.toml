app = "pancanga-engine-rc1-api"
primary_region = "mad"

[build]
  dockerfile = "Deploy/RC1/Dockerfile"

[env]
  RC1_EXPERIENCE_ADDRESS = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
